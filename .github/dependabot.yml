# See GitHub's documentation for more information on this file:
# https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates
version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    commit-message:
      # Prefix commit messages with "chore"; include: scope appends the
      # dependency scope automatically -> "chore(deps): " / "chore(deps-dev): "
      # This follows conventional commits and works with release-please
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # Maintain dependencies for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      # Check for updates to Go modules every week
      interval: "weekly"
    commit-message:
      # Prefix commit messages with "chore"; include: scope appends the
      # dependency scope automatically -> "chore(deps): " / "chore(deps-dev): "
      # This follows conventional commits and works with release-please
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
