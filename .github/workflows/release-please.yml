on:
  push:
    branches:
    - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    name: '🔖 Release Please'
    runs-on: ubuntu-latest
    steps:
    - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
      with:
        release-type: terraform-module
        token: ${{ secrets.PAT_TOKEN }}